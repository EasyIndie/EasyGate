name: Release

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example 0.1.0"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write   # Needed for cosign keyless signing
  actions: read     # Needed for SLSA provenance

jobs:
  release:
    name: Publish standalone installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp scripts/easygate dist/easygate
          cp scripts/easygate.ps1 dist/easygate.ps1
          cp scripts/install.ps1 dist/install.ps1
          # install.sh —— 嵌入 easygate CLI 的 SHA256 校验和
          # 用户通过 curl|bash 安装时自动验证下载文件完整性
          cp scripts/install.sh dist/install.sh
          CHECKSUM=$(shasum -a 256 dist/easygate | awk '{print $1}')
          # 替换整行变量赋值，__SKIP__ 保留在条件判断中不被触及
          sed -i "s/^EASYGATE_CLI_CHECKSUM=.*/EASYGATE_CLI_CHECKSUM=\"${CHECKSUM}\"/" dist/install.sh
          chmod +x dist/easygate dist/install.sh
          cd dist
          shasum -a 256 easygate easygate.ps1 install.sh install.ps1 > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS with cosign (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./dist/
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag

      - name: Prepend install one-liner to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="https://raw.githubusercontent.com/EasyIndie/EasyGate/${TAG_NAME}/scripts/install.sh"
          EXISTING="$(gh release view "$TAG_NAME" --json body -q .body)"
          NOTES=$(printf '## 一键部署\n\n### Docker Compose 模式（推荐）\n\n```sh\ncurl -fsSL %s | bash -s -- deploy --domain example.com --demo\n```\n\n### 原生模式（无需 Docker）\n\n先安装 CLI：\n```sh\ncurl -fsSL %s | bash\n```\n再部署：\n```sh\neasygate deploy --native --domain example.com --demo\n```\n\n---\n\n%s' "$BASE" "$BASE" "$EXISTING")
          gh release edit "$TAG_NAME" --notes "$NOTES"
