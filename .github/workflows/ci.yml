name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }} / bash
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: make test

  windows:
    name: windows-latest / powershell
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PowerShell tests
        shell: pwsh
        run: .\scripts\test.ps1
