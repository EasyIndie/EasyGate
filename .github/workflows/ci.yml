name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unix:
    name: ${{ matrix.os }} / bash
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        run: make test

      - name: Run local acceptance
        env:
          EASYGATE_ACCEPTANCE_STRICT: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}
        run: ./scripts/local-acceptance.sh

      - name: Run native local acceptance
        env:
          EASYGATE_ACCEPTANCE_STRICT: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}
        run: ./scripts/local-acceptance-native.sh

  windows:
    name: windows-latest / powershell
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run PowerShell tests
        shell: pwsh
        run: .\scripts\test.ps1

      - name: Run local acceptance
        shell: pwsh
        env:
          EASYGATE_ACCEPTANCE_STRICT: "false"
        run: .\scripts\local-acceptance.ps1

      - name: Run native local acceptance
        shell: pwsh
        env:
          EASYGATE_ACCEPTANCE_STRICT: "false"
        run: .\scripts\local-acceptance-native.ps1
